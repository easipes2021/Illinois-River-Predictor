# Manual Sync Trigger: 2026-04-02-v1

name: Illinois River Auto-Update

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update-river-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests scipy scikit-learn dataretrieval

      - name: Run Pipeline
        run: |
          python3 fetch_all_gauges.py
          python3 fetch_nwa_precip.py
          python3 fetch_weather.py
          python3 merge_data.py
          python3 predict_all.py
          python3 forecast_now.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Commit and Push Results
        run: |
          git config --global user.name 'Illinois-River-Bot'
          git config --global user.email 'bot@illinoisriver.ai'
          git add .
          git commit -m "Automated River Update: $(date)" || echo "No changes to commit"
          git push